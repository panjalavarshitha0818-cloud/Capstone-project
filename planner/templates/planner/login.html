{% extends 'planner/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Log in to your StudySync account.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Login</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
