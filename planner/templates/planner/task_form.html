{% extends 'planner/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2>{{ title }}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">Save Task</button>
                <a href="{% url 'dashboard' %}" class="btn" style="background-color: var(--border); color: var(--text-dark);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
